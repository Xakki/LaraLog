# Универсальный JSON-парсер. Time_Key намеренно отсутствует — извлечение
# event ts из datetime/time_local делается одним местом в Lua-функции
# normalize_event_time (cleanup.lua), независимо от того через какой
# input/filter попала запись.
[PARSER]
    Name         json_default
    Format       json

# Nginx error log: "2024/12/30 12:34:56 [error] 1234#0: *5678 message"
# Уровень — debug|info|notice|warn|error|crit|alert|emerg.
# Connection id (*N) есть только у ошибок в контексте запроса.
# datetime НЕ используется как Time_Key — nginx пишет его в TZ контейнера
# (Europe/Moscow) без указания зоны, fluent-bit интерпретировал бы как UTC,
# и в Graylog запись оказывалась бы со сдвигом +3ч "в будущее" (вне окна
# поиска "Last 5 minutes"). Используем дефолтный timestamp = время приёма
# fluent-bit (delta от реального события — async buffer flush ~3s).
[PARSER]
    Name         nginx_error
    Format       regex
    Regex        ^(?<datetime>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?<level_str>[a-z]+)\] (?<pid>\d+)#(?<tid>\d+):(?: \*(?<connection_id>\d+))?\s*(?<message>.*)$

# KeyDB / Redis. Префикс перед датой — "<pid>:<role>" (Redis) или
# "<pid>:<tid>:<role>" (KeyDB многопоточный):
#   "1:M 30 Apr 2026 12:34:56.789 # message"
#   "1:15:S 30 Apr 2026 12:34:56.789 * message"
# role:  X (sentinel) | C (rdb child) | S (slave/replica) | M (master)
# level: # warning | * notice | - verbose | . debug
# datetime — без TZ, тоже не используем как Time_Key (см. nginx_error выше).
[PARSER]
    Name         keydb
    Format       regex
    Regex        ^(?<pid>\d+):(?:(?<tid>\d+):)?(?<role>[A-Z]) (?<datetime>\d{1,2} \w+ \d{4} \d{2}:\d{2}:\d{2}\.\d{3}) (?<level_char>[#\*\.\-]) (?<message>.*)$

# MariaDB error log (после склейки multiline):
#   "2026-04-30 12:34:56 0 [Note] Server socket created..."
# Уровни — Note|Warning|ERROR. Часть строк ("Version: ..." и continuation)
# не подойдут под regex и пройдут как есть с дефолтным level=INFO.
# datetime — без TZ, не Time_Key (см. nginx_error выше).
[PARSER]
    Name         mariadb_record
    Format       regex
    Regex        ^(?<datetime>\d{4}-\d{2}-\d{2}\s+\d{1,2}:\d{2}:\d{2})\s+(?<thread>\d+)?\s*\[(?<level_str>\w+)\]\s+(?<message>.*)$

# Nginx access JSON: поле "request" имеет вид "GET /uri HTTP/1.1".
# Разбиваем его на request_method / request_uri / request_proto.
# Preserve_Key Off (default) — после успешного матча исходный "request"
# удаляется из записи, чтобы не дублировать сообщение (uri уезжает в short_message).
# При мисматче (request="-" у 400 Bad Request, обрезанные строки и т.п.)
# fluent-bit оставит "request" как есть; fallback в чейне short_message подхватит.
[PARSER]
    Name         nginx_request
    Format       regex
    Regex        ^(?<request_method>[A-Z]+) (?<request_uri>\S+) (?<request_proto>HTTP/[\d\.]+)$

[MULTILINE_PARSER]
    Name          mysql
    Type          regex
    Flush_timeout 1000
    # Правила склейки многострочных логов MariaDB.
    # Новая запись в логе обычно начинается с года (например, 2024-) или слова "Time:"
    Rule      "start_state"   "^(20\d{2}\-|Time: \d{4})"   "cont"
    Rule      "cont"          "^(?!20\d{2}\-|Time: \d{4})" "cont"
