# =========================================================
# gl.php — per-type фильтр: отрезание php-fpm шума у источника
# =========================================================
# php-fpm шум, режем у источника:
#   1) lifecycle NOTICE: "ready to handle connections", "fpm is running",
#      запуск/остановка воркеров pool ("child N exited", "child N started")
#      — нормальная работа pool manager, не observability.
#   2) master worker-recycle артефакт на современном Linux: "unable to read
#      what child N said into stdout/stderr: Bad file descriptor" и
#      "epoll: unable to (remove|add) fd: Bad file descriptor (9)". Бенайн,
#      на запросы не влияет.
# Узкий паттерн: настоящие FPM-ERROR (e.g. "unable to bind listening socket")
# НЕ подпадают.
[FILTER]
    Name    grep
    Match   gl.php
    Exclude log (NOTICE: (ready to handle connections|fpm is running|\[pool www\] child \d+ (started|exited))|unable to read what child \d+ said into std(out|err): Bad file descriptor|epoll: unable to (remove|add) fd: Bad file descriptor)
