# =========================================================
# gl.mariadb — per-type фильтры error log (stderr через docker-driver)
# =========================================================
# ВАЖНО: Match строго "gl.mariadb" (без wildcard). Slowlog идёт под gl.mariadb-slowlog
# (≠ gl.mariadb), у него multiline уже сделан на input'е — error-парсер его не тронет.

# Склейка стек-трейсов и многострочных InnoDB-сообщений.
# Multiline-парсер mysql тот же что у slowlog-tail.
[FILTER]
    Name                  multiline
    Match                 gl.mariadb
    Multiline.Parser      mysql
    Multiline.Key_Content log

# MariaDB error log (после multiline-склейки): "2026-04-30 12:34:56 0 [Note] ...".
# Слоулог пройдёт как есть (формат "# Time: ... # User@Host: ...") — парсеру не подходит.
[FILTER]
    Name         parser
    Match        gl.mariadb
    Key_Name     log
    Parser       mariadb_record
    Reserve_Data On

# Переименовываем извлечённое парсером поле datetime → datetime_raw.
# Исходный формат "YYYY-MM-DD H:MM:SS" (двойной пробел, без leading zero часа)
# не парсится OpenSearch index-mapping'ом для типа date и роняет bulk-вставку.
# Под именем datetime_raw поле приземляется как plain string (text/keyword),
# mapping не падает, оригинальная метка источника видна в Graylog при детализации.
# GELF.timestamp при этом ставится временем приёма fluent-bit'ом.
[FILTER]
    Name      modify
    Match     gl.mariadb
    Rename    datetime datetime_raw
