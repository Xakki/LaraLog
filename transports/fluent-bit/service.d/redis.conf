# =========================================================
# gl.redis — per-type фильтр KeyDB/Redis
# =========================================================
# KeyDB / Redis: "1:M 30 Apr 2026 12:34:56.789 # message".
# Не сработает на ASCII-art logo и других нестандартных строках — они пройдут как есть.
[FILTER]
    Name         parser
    Match        gl.redis
    Key_Name     log
    Parser       keydb
    Reserve_Data On

# KeyDB обрезается до warnings/errors на источнике (loglevel=warning в keydb.conf),
# доп. grep не нужен. Memcached не используется. Для нового сервиса с шумом —
# добавь grep в его service.d/<log_format>.conf.
