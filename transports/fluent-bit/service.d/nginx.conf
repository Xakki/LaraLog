# =========================================================
# gl.nginx — per-type фильтры nginx (access JSON + error text)
# =========================================================
# Тег gl.nginx ставит rewrite_tag по лейблу log_format (дефолт = docker_service).

# Nginx access JSON — после json_default в записи есть "message"="GET /uri HTTP/1.1"
# (nginx log_format json_combined пишет $request под ключом "message" —
# чтобы сразу совпало с GELF short_message и не плодилось дублей).
# Разбиваем на request_method / request_uri / request_proto. Preserve_Key Off —
# сам ключ "message" удалится; uri ниже уедет в short_message через request_uri.
[FILTER]
    Name         parser
    Match        gl.nginx
    Key_Name     message
    Parser       nginx_request
    Reserve_Data On

# Nginx error log (stderr, текст). Текстовая запись имеет вид
# "2024/12/30 12:34:56 [error] 1234#0: *5678 message".
# Парсер не сработает на access JSON — там поля уже в корне, "log" удалён.
[FILTER]
    Name         parser
    Match        gl.nginx
    Key_Name     log
    Parser       nginx_error
    Reserve_Data On

# Хвост nginx error message: ", client: <ip>, server: <name>, request: \"...\","
# " host: \"...\", referrer: \"...\", upstream: \"...\"". Раскладываем в отдельные
# поля (client, server, request_method/uri/proto, request_host, referrer, upstream).
# Сам "message" остаётся только с описанием ошибки (без хвоста). Если нет
# ", client: " — функция возвращает 0 и запись не меняется.
[FILTER]
    Name   lua
    Match  gl.nginx
    script /fluent-bit/etc/cleanup.lua
    call   parse_nginx_error_context
