[SERVICE]
    Flush        3
    # warn — не пишем info-шум самого fluent-bit (старт плагинов и т.п.).
    # Уровни: off, error, warn, info, debug, trace.
    Log_Level    warn
    # Built-in HTTP-сервер для метрик и проверки готовности (порт 2020)
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    Parsers_File parsers.conf

# =========================================================
# INPUTS
# =========================================================

# Docker fluentd-driver: каждый сервис с logging.driver=fluentd шлёт сюда.
# Tag формируется на стороне Docker как "service.<container_name>" — это лишь входной
# namespace. Дальше rewrite_tag (см. секцию ROUTING) переносит записи в gl.<log_format>,
# поэтому per-type парсеры НЕ зависят ни от имени контейнера, ни от имени compose-сервиса.
[INPUT]
    Name    forward
    Listen  0.0.0.0
    Port    24224

# Внутренние метрики самого fluent-bit для Prometheus.
# Идут через ОТДЕЛЬНЫЙ pipeline (filters не применяются к metrics — см. доку
# https://docs.fluentbit.io/manual/data-pipeline/inputs/fluentbit-metrics),
# поэтому отдельный output prometheus_exporter ниже на порту 2021.
# /api/v1/metrics/prometheus на :2020 (HTTP_Server) тоже работает, но это legacy.
[INPUT]
    Name            fluentbit_metrics
    Tag             internal_metrics
    Scrape_Interval 5

# MariaDB slowlog читаем напрямую с диска: mysqld пишет slowlog только в файл
# (вывод в stderr не поддерживается). Error log с 2026-05 переключён на stderr
# (см. mariadb.cnf log_error=) — приходит через docker fluentd-driver под
# gl.mariadb (routing по лейблу log_format), склейка multiline — в service.d/mariadb.conf.
# Read_from_Head=False — на старте читаем только новые строки.
[INPUT]
    Name             tail
    Path             /var/log/mysql_logs/*slow*.log
    Tag              gl.mariadb-slowlog
    Read_from_Head   False
    Multiline.Parser mysql
    DB               /var/lib/fluent-bit/mariadb_tail.db
    Rotate_Wait      5
    Buffer_Chunk_Size 64k
    Buffer_Max_Size   1M
    Skip_Long_Lines   On

# Универсальный JSON-tail: любые NDJSON-файлы, положенные в /var/log/json/,
# автоматически подхватываются. Соглашение: имя файла = имя сервиса
# (например /var/log/json/symfony.ndjson → docker_service=symfony, log_format=symfony).
# tier/log_format можно переопределить, положив их в каждую JSON-строку (иначе "app"/basename).
# Полный набор canonical docker_*-полей проставляет enrich_jsonfile в cleanup.lua.
[INPUT]
    Name             tail
    Path             /var/log/json/*.ndjson
    Path_Key         file
    Tag              gl.jsonfile.*
    Read_from_Head   False
    Parser           json_default
    DB               /var/lib/fluent-bit/json_tail.db
    Rotate_Wait      5
    # NDJSON со stack trace/context может быть длиннее дефолтного 32k.
    # Без буфера fluent-bit пишет "lines are too long. Skipping file" и весь файл выпадает.
    Buffer_Chunk_Size 64k
    Buffer_Max_Size   1M
    Skip_Long_Lines   On

# =========================================================
# FILTERS — host-level поля из env контейнера fluent-bit (на ВСЕ записи)
# =========================================================
# host (GELF source/IP), hostname (имя), docker_profile (COMPOSE_PROFILES) одинаковы
# для всех логов этого хоста, поэтому ставим их глобально из env САМОГО контейнера
# fluent-bit (см. fluent-logging.yml environment), а НЕ через logging.options.env
# драйвера. Работает и для docker-input, и для tail-input (у файлов docker-env нет).
# host обязателен: иначе GELF encoder поставил бы host = hostname контейнера fluent-bit
# (= IP в docker bridge 172.18.0.x). modify Add ставит ключ только если его ещё нет.
[FILTER]
    Name   modify
    Match  *
    Add    host ${HOST_IP}
    Add    hostname ${HOST_NAME}
    Add    docker_profile ${COMPOSE_PROFILES}

# =========================================================
# FILTERS — обогащение tail-input записей (нет docker-полей у файлов)
# =========================================================
# tail-input'ы читают файлы напрямую — у этих записей нет container_id/labels
# из docker fluentd-driver. Lua-функции обогащают канонический набор
# docker_service/docker_tier/log_format/docker_project/docker_container/log_source:
#   - enrich_mariadb_tail  — для gl.mariadb-slowlog (хардкодом, 1 источник)
#   - enrich_jsonfile      — для gl.jsonfile.* (basename файла → docker_service,
#                            tier/log_format из record JSON если есть, иначе "app"/basename)
[FILTER]
    Name   lua
    Match  gl.mariadb-slowlog
    script /fluent-bit/etc/cleanup.lua
    call   enrich_mariadb_tail

[FILTER]
    Name   lua
    Match  gl.jsonfile.*
    script /fluent-bit/etc/cleanup.lua
    call   enrich_jsonfile

# =========================================================
# FILTERS — docker-метаданные driver'а → плоские docker_* поля
# =========================================================
# Docker fluentd-driver добавляет в record:
#   container_id, container_name, source ("stdout"/"stderr"), log
# Дополнительно — поля из labels: опции driver'а с ОРИГИНАЛЬНЫМИ именами
# (без префикса label_, начиная с docker v20+; dev 29.5, prod 25+).
# Дефис/точка в названии label сохраняются — поэтому Rename работает с
# "tier", "log_format", "com.docker.compose.service" etc.
# (env: в драйвере НЕ используем — host/hostname/docker_profile ставятся глобально выше.)
[FILTER]
    Name   modify
    Match  service.*
    Rename source                            log_source
    Rename container_name                    docker_container
    Rename com.docker.compose.service        docker_service
    Rename com.docker.compose.project        docker_project
    Rename com.docker.compose.image          docker_image
    Rename tier                              docker_tier
    # log_format по умолчанию = имя compose-сервиса (docker_service). Copy ставит ключ
    # только если его ещё нет → явный label log_format переопределяет, а остальные
    # сервисы работают без него. Должен идти ПОСЛЕ Rename docker_service.
    Copy docker_service                      log_format

# Срезаем лидирующий "/" в docker_container (Docker отдаёт .Name как "/matrix_dev-php-1").
[FILTER]
    Name   lua
    Match  service.*
    script /fluent-bit/etc/cleanup.lua
    call   strip_container_name

# =========================================================
# ROUTING — тег по log_format (выбор набора per-type парсеров)
# =========================================================
# Маршрутизируем по лейблу log_format (выше: явный label или дефолт = docker_service),
# который НЕ зависит ни от имени контейнера, ни от имени compose-сервиса. rewrite_tag
# переносит docker-записи (у них есть container_id) из service.<контейнер> в gl.<log_format>
# — отдельное пространство тегов "gl.*". Дальше per-type парсеры (service.d/*.conf) и
# OUTPUT матчат gl.*.
#   - Петля исключена by design: новый тег gl.* НЕ попадает под Match service.*.
#   - tail-входы (slowlog/jsonfile) уже идут под gl.* со входа — OUTPUT gl.* их соберёт
#     (container_id у них нет → этим rewrite не трогаются).
#   - slowlog = gl.mariadb-slowlog (≠ gl.mariadb) → error-парсер mariadb его не тронет.
#   - Размещён ПОСЛЕ Copy docker_service→log_format (иначе $log_format пуст).
[FILTER]
    Name          rewrite_tag
    Match         service.*
    Rule          $container_id ^.+$ gl.$log_format false
    Emitter_Name  re_kind

# =========================================================
# FILTERS — парсинг тела сообщения
# =========================================================
# Symfony/Monolog (JsonFormatter в stderr) и Nginx access (json_combined)
# пишут в формате JSON. Разворачиваем поля JSON в корень записи.
# Если строка не JSON (php-fpm NOTICE, PHP error_log, MySQL multi-line) —
# parser тихо пропустит её, и поле "log" останется как есть.
[FILTER]
    Name         parser
    Match        gl.*
    Key_Name     log
    Parser       json_default
    Reserve_Data On

# Нативный (не-JSON) вывод контейнеров: json_default не распарсил строку,
# Reserve_Data оставил исходный "log". Помечаем log_kind=native — чтобы в Graylog
# отделять сырой stderr от структурированных логов. Должен идти СРАЗУ после
# json_default и ДО normalize_event_time (там "log" уезжает в short_message и удаляется).
[FILTER]
    Name   lua
    Match  gl.*
    script /fluent-bit/etc/cleanup.lua
    call   tag_native_stderr

# =========================================================
# PER-TYPE FILTERS — вынесены по файлам в service.d/<log_format>.conf
# =========================================================
# Каждый файл матчит свой тег gl.<log_format> (nginx/redis/mariadb/php).
# Добавить новый тип логов = создать service.d/<fmt>.conf + проставить сервису
# label log_format:<fmt>; главный конфиг не трогается. Порядок включения файлов
# не гарантирован, но матчи дизъюнктны (разные gl.<fmt>) — порядок не важен.
# Размещён ПОСЛЕ json_default+tag_native_stderr и ДО глобальных infer_level/normalize/flatten.
@INCLUDE service.d/*.conf

# =========================================================
# FILTERS — нормализация level / level_name (Monolog-шкала)
# =========================================================
# Symfony/Monolog (JsonFormatter) уже кладёт level + level_name в record.
# Для остальных источников выводим из level_str (nginx error / mariadb),
# level_char (keydb), HTTP status (nginx access JSON) или дефолт INFO.
# См. cleanup.lua — функция infer_level.
[FILTER]
    Name   lua
    Match  *
    script /fluent-bit/etc/cleanup.lua
    call   infer_level

# =========================================================
# FILTERS — нормализация event timestamp + защита GELF mandatory полей
# =========================================================
# 1) Event ts из record.datetime (Laravel/Monolog/PhpErrorCatcher, ISO 8601)
#    или record.time_local (nginx access). Иначе — оставляем входной ts.
# 2) Top-level "timestamp" (если случайно попал из стороннего PHP-логгера)
#    переименовывается в "timestamp_raw": GELF-decoder валит запись на
#    "invalid timestamp (STRING)", если тип не number. Сохраняем как _raw,
#    чтобы исходное значение было видно в Graylog для отладки.
# 3) short_message != "" — Graylog кидает "empty mandatory short_message"
#    даже когда ключ есть, но строка пустая (modify Condition Key_does_not_exist
#    такое не отсекает).
[FILTER]
    Name   lua
    Match  *
    script /fluent-bit/etc/cleanup.lua
    call   normalize_event_time

# =========================================================
# FILTERS — расплющивание вложенных map/array (для GELF)
# =========================================================
# Laravel/Monolog context.user.id, context.exception.trace[] и т.п. — GELF
# не поддерживает nested. Lua-фильтр превращает их в context_user_id,
# context_exception_trace_0. Применяется к ВСЕМ полям-таблицам, кроме служебных.
[FILTER]
    Name   lua
    Match  *
    script /fluent-bit/etc/cleanup.lua
    call   flatten_nested

# =========================================================
# OUTPUT
# =========================================================

[OUTPUT]
    Name             http
    Match            gl.*
    Host             ${GRAYLOG_HOST}
    Port             ${GRAYLOG_PORT}
    URI              ${GRAYLOG_URI}
    Format           gelf
    # GELF.level — поле для syslog severity (0..7). Пишем туда наш Lua-вычисленный
    # syslog_severity; Monolog-шкала (200/250/300/...) лежит отдельно в level_php
    # (зарезервированное GELF-поле "level" освобождаем в infer_level).
    Gelf_Level_Key   syslog_severity
    tls              On
    tls.verify       On
    Retry_Limit      5

# Экспорт internal_metrics в Prometheus-формате. nginx проксирует
# /sq_fluent_exporter → http://fluent-bit:2021/metrics (внутри docker-сети,
# наружу 2021 не публикуется).
[OUTPUT]
    Name   prometheus_exporter
    Match  internal_metrics
    Host   0.0.0.0
    Port   2021

# Debug-stdout по умолчанию выключен. Контейнер fluent-bit логируется через
# driver: json-file (см. fluent-logging.yml), его stdout идёт в `docker logs`,
# а НЕ обратно в forward-input — петли нет. Для локальной отладки структуры записи
# временно добавь: [OUTPUT] Name stdout / Match gl.php / Format json_lines.
