[SERVICE]
    Flush        3
    # warn — не пишем info-шум самого fluent-bit (старт плагинов и т.п.).
    # Уровни: off, error, warn, info, debug, trace.
    Log_Level    warn
    # Built-in HTTP-сервер для метрик и проверки готовности (порт 2020)
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    Parsers_File parsers.conf

# =========================================================
# INPUTS
# =========================================================

# Docker fluentd-driver: каждый сервис с logging.driver=fluentd шлёт сюда.
# Tag формируется на стороне Docker как "service.<container_name>" — это лишь входной
# namespace. Дальше rewrite_tag (см. секцию ROUTING) переносит записи в gl.<service>
# по лейблу com.docker.compose.service, поэтому per-type парсеры НЕ зависят от того,
# как назван контейнер.
[INPUT]
    Name    forward
    Listen  0.0.0.0
    Port    24224

# Внутренние метрики самого fluent-bit для Prometheus.
# Идут через ОТДЕЛЬНЫЙ pipeline (filters не применяются к metrics — см. доку
# https://docs.fluentbit.io/manual/data-pipeline/inputs/fluentbit-metrics),
# поэтому отдельный output prometheus_exporter ниже на порту 2021.
# /api/v1/metrics/prometheus на :2020 (HTTP_Server) тоже работает, но это legacy.
[INPUT]
    Name            fluentbit_metrics
    Tag             internal_metrics
    Scrape_Interval 5

# MariaDB slowlog читаем напрямую с диска: mysqld пишет slowlog только в файл
# (вывод в stderr не поддерживается). Error log с 2026-05 переключён на stderr
# (см. mariadb.cnf log_error=) — приходит через docker fluentd-driver под
# под gl.mariadb (routing по service-лейблу), склейка multiline делается [FILTER] multiline ниже.
# Read_from_Head=False — на старте читаем только новые строки.
[INPUT]
    Name             tail
    Path             /var/log/mysql_logs/*slow*.log
    Tag              gl.mariadb-slowlog
    Read_from_Head   False
    Multiline.Parser mysql
    DB               /var/lib/fluent-bit/mariadb_tail.db
    Rotate_Wait      5
    Buffer_Chunk_Size 64k
    Buffer_Max_Size   1M
    Skip_Long_Lines   On

# Универсальный JSON-tail: любые NDJSON-файлы, положенные в /var/log/json/,
# автоматически подхватываются. Соглашение: имя файла = имя сервиса
# (например /var/log/json/symfony.ndjson → service=symfony). Tier по умолчанию
# "app"; приложение может переопределить, кладя tier в каждую JSON-строку.
# Полный набор canonical-полей (app_env/hostname/compose_project/container_name/log_source)
# проставляет enrich_jsonfile в cleanup.lua.
[INPUT]
    Name             tail
    Path             /var/log/json/*.ndjson
    Path_Key         file
    Tag              gl.jsonfile.*
    Read_from_Head   False
    Parser           json_default
    DB               /var/lib/fluent-bit/json_tail.db
    Rotate_Wait      5
    # NDJSON со stack trace/context может быть длиннее дефолтного 32k.
    # Без буфера fluent-bit пишет "lines are too long. Skipping file" и весь файл выпадает.
    Buffer_Chunk_Size 64k
    Buffer_Max_Size   1M
    Skip_Long_Lines   On

# =========================================================
# FILTERS — host = реальный IP хоста (Graylog показывает как source)
# =========================================================
# По умолчанию GELF encoder ставит host = hostname контейнера fluent-bit,
# и Graylog видит source = IP контейнера в docker bridge (172.18.0.x).
# Подменяем на IP хоста (env HOST_IP из docker-compose → fluent-bit контейнер).
# Работает и для docker-input, и для tail-input.
[FILTER]
    Name   modify
    Match  *
    Add    host ${HOST_IP}

# =========================================================
# FILTERS — обогащение tail-input записей (нет docker-полей у файлов)
# =========================================================
# tail-input'ы читают файлы напрямую — у этих записей нет container_id/labels
# из docker fluentd-driver. Lua-функции обогащают канонический набор
# service/tier/app_env/hostname/compose_project/container_name/log_source:
#   - enrich_mariadb_tail  — для gl.mariadb-slowlog (хардкодом, 1 источник)
#   - enrich_jsonfile      — для gl.jsonfile.* (basename файла → service,
#                            tier из record JSON если есть, иначе "app")
[FILTER]
    Name   lua
    Match  gl.mariadb-slowlog
    script /fluent-bit/etc/cleanup.lua
    call   enrich_mariadb_tail

[FILTER]
    Name   lua
    Match  gl.jsonfile.*
    script /fluent-bit/etc/cleanup.lua
    call   enrich_jsonfile

# =========================================================
# FILTERS — переименование «технических» полей docker fluentd-driver
# =========================================================
# Docker fluentd-driver добавляет в record:
#   container_id, container_name, source ("stdout"/"stderr"), log
# Дополнительно — поля из env: и labels: опций driver'а с ОРИГИНАЛЬНЫМИ именами
# (без префикса env_/label_, как утверждает старая документация).
# Дефис/точка в названии label сохраняются — поэтому Rename работает с "tier", "com.docker.compose.service" etc.
[FILTER]
    Name   modify
    Match  service.*
    Rename source                            log_source
    # Имена БЕЗ префикса env_/label_ — это канонический формат Docker
    # fluentd-driver, начиная с v20+ (на dev сейчас 29.4, на prod 25+).
    # Старый префиксный fallback (env_APP_ENV → app_env, label_tier → tier
    # и т.п.) удалён в шаге B1 рефакторинга — на текущих движках не срабатывал.
    # Если когда-нибудь Docker даунгрейднется ниже v20 — вернуть из git history.
    Rename APP_ENV                           app_env
    Rename HOST_NAME                         hostname
    Rename COMPOSE_PROFILES                  profile
    Rename com.docker.compose.service        service
    Rename com.docker.compose.project        compose_project
    Rename com.docker.compose.image          image
    # COMPOSE_PROJECT_NAME (env) дублировал com.docker.compose.project (label)
    # — удаляем env-копию, оставляем label-копию под compose_project.
    Remove COMPOSE_PROJECT_NAME
    # NB: для "tier" Rename не нужен — fluentd-driver отдаёт сразу под
    # каноническим именем, а самопереименование "tier→tier" даёт спам
    # «Existing key tier found» в debug-логе на каждое сообщение.

# Срезаем лидирующий "/" в container_name (Docker отдаёт .Name как "/sa-dev-laravel").
[FILTER]
    Name   lua
    Match  service.*
    script /fluent-bit/etc/cleanup.lua
    call   strip_container_name

# =========================================================
# ROUTING — переход с тега-по-имени-контейнера на тег-по-сервису
# =========================================================
# Раньше per-type парсеры выбирались по СУФФИКСУ имени контейнера
# (Match service.*-nginx и т.п.) — это требовало называть контейнеры *-nginx/*-redis/...
# Теперь маршрутизируем по лейблу com.docker.compose.service (выше переименован в "service"),
# который НЕ зависит от имени контейнера. rewrite_tag переносит docker-записи
# (у них есть container_id) из service.<имя_контейнера> в gl.<service> — отдельное
# пространство тегов "gl.*". Дальше всё (per-type парсеры + OUTPUT) матчит gl.*.
#   - Петля исключена by design: новый тег gl.* НЕ попадает под Match service.*, поэтому
#     re-emit не триггерит этот же фильтр повторно (не полагаемся на авто-защиту).
#   - tail-входы (slowlog/jsonfile) уже идут под gl.* прямо со входа — поэтому
#     OUTPUT gl.* собирает и их (container_id у них нет → этим rewrite не трогаются).
#   - slowlog остаётся gl.mariadb-slowlog (≠ gl.mariadb) → error-парсер mariadb его не тронет.
#   - Размещён ПОСЛЕ ренейма com.docker.compose.service→service (иначе $service пуст)
#     и до парсинга тела — чтобы нижние фильтры отработали по новому тегу ровно один раз.
[FILTER]
    Name          rewrite_tag
    Match         service.*
    Rule          $container_id ^.+$ gl.$service false
    Emitter_Name  re_kind

# =========================================================
# FILTERS — парсинг тела сообщения
# =========================================================
# Symfony/Monolog (JsonFormatter в stderr) и Nginx access (json_combined)
# пишут в формате JSON. Разворачиваем поля JSON в корень записи.
# Если строка не JSON (php-fpm NOTICE, PHP error_log, MySQL multi-line) —
# parser тихо пропустит её, и поле "log" останется как есть.
[FILTER]
    Name         parser
    Match        gl.*
    Key_Name     log
    Parser       json_default
    Reserve_Data On

# Нативный (не-JSON) вывод backend/cron/frontend-контейнеров: json_default
# не распарсил строку, Reserve_Data оставил исходный "log". Помечаем
# log_kind=native + exec_kind=fpm|cli (по tier-label) — чтобы в Graylog
# отделять сырой stderr от структурированных логов. Должен идти СРАЗУ после
# json_default и ДО normalize_event_time (там "log" уезжает в short_message и удаляется).
[FILTER]
    Name   lua
    Match  gl.*
    script /fluent-bit/etc/cleanup.lua
    call   tag_native_stderr

# Nginx access JSON — после json_default в записи есть "message"="GET /uri HTTP/1.1"
# (nginx log_format json_combined пишет $request под ключом "message" —
# чтобы сразу совпало с GELF short_message и не плодилось дублей).
# Разбиваем на request_method / request_uri / request_proto. Preserve_Key Off —
# сам ключ "message" удалится; uri ниже уедет в short_message через request_uri.
[FILTER]
    Name         parser
    Match        gl.nginx
    Key_Name     message
    Parser       nginx_request
    Reserve_Data On

# Nginx error log (stderr, текст). Текстовая запись имеет вид
# "2024/12/30 12:34:56 [error] 1234#0: *5678 message".
# Парсер не сработает на access JSON — там поля уже в корне, "log" удалён.
[FILTER]
    Name         parser
    Match        gl.nginx
    Key_Name     log
    Parser       nginx_error
    Reserve_Data On

# Хвост nginx error message: ", client: <ip>, server: <name>, request: \"...\","
# " host: \"...\", referrer: \"...\", upstream: \"...\"". Раскладываем в отдельные
# поля (client, server, request_method/uri/proto, request_host, referrer, upstream).
# Сам "message" остаётся только с описанием ошибки (без хвоста). Если нет
# ", client: " — функция возвращает 0 и запись не меняется.
[FILTER]
    Name   lua
    Match  gl.nginx
    script /fluent-bit/etc/cleanup.lua
    call   parse_nginx_error_context

# KeyDB / Redis: "1:M 30 Apr 2026 12:34:56.789 # message".
# Не сработает на ASCII-art logo и других нестандартных строках — они пройдут как есть.
[FILTER]
    Name         parser
    Match        gl.redis
    Key_Name     log
    Parser       keydb
    Reserve_Data On

# MariaDB error log (stderr через docker-driver): склейка стек-трейсов и
# многострочных InnoDB-сообщений. Multiline-парсер mysql тот же что у slowlog-tail.
# Срабатывает на gl.mariadb (error-log контейнера service=mariadb). Slowlog идёт под
# gl.mariadb-slowlog (≠ gl.mariadb) — там multiline уже сделан на input'е, error-парсер не нужен.
[FILTER]
    Name                  multiline
    Match                 gl.mariadb
    Multiline.Parser      mysql
    Multiline.Key_Content log

# MariaDB error log (после multiline-склейки): "2026-04-30 12:34:56 0 [Note] ...".
# Слоулог пройдёт как есть (формат "# Time: ... # User@Host: ...") — парсеру не подходит.
[FILTER]
    Name         parser
    Match        gl.mariadb
    Key_Name     log
    Parser       mariadb_record
    Reserve_Data On

# Переименовываем извлечённое парсером поле datetime → datetime_raw.
# Исходный формат "YYYY-MM-DD H:MM:SS" (двойной пробел, без leading zero часа)
# не парсится OpenSearch index-mapping'ом для типа date и роняет bulk-вставку.
# Под именем datetime_raw поле приземляется как plain string (text/keyword),
# mapping не падает, оригинальная метка источника видна в Graylog при
# детализации записи. GELF.timestamp при этом ставится временем приёма
# fluent-bit'ом (см. комментарий о TZ в parsers.conf над nginx_error парсером).
[FILTER]
    Name      modify
    Match     gl.mariadb
    Rename    datetime datetime_raw

# =========================================================
# FILTERS — отрезание шума как можно ближе к источнику
# =========================================================

# php-fpm шум, режем у источника:
#   1) lifecycle NOTICE: "ready to handle connections", "fpm is running",
#      запуск/остановка воркеров pool ("child N exited", "child N started")
#      — нормальная работа pool manager, не observability.
#   2) master worker-recycle артефакт на современном Linux: "unable to read
#      what child N said into stdout/stderr: Bad file descriptor" и
#      "epoll: unable to (remove|add) fd: Bad file descriptor (9)". Бенайн,
#      на запросы не влияет.
# Узкий паттерн: настоящие FPM-ERROR (e.g. "unable to bind listening socket")
# НЕ подпадают.
[FILTER]
    Name    grep
    Match   gl.php
    Exclude log (NOTICE: (ready to handle connections|fpm is running|\[pool www\] child \d+ (started|exited))|unable to read what child \d+ said into std(out|err): Bad file descriptor|epoll: unable to (remove|add) fd: Bad file descriptor)

# KeyDB обрезается до warnings/errors на источнике (loglevel=warning в keydb.conf),
# доп. grep не нужен. Memcached не используется. Если когда-нибудь вернутся
# Laravel/Memcached/прочие сервисы — добавь grep по gl.<service>.

# =========================================================
# FILTERS — нормализация level / level_name (Monolog-шкала)
# =========================================================
# Symfony/Monolog (JsonFormatter) уже кладёт level + level_name в record.
# Для остальных источников выводим из level_str (nginx error / mariadb),
# level_char (keydb), HTTP status (nginx access JSON) или дефолт INFO.
# См. cleanup.lua — функция infer_level.
[FILTER]
    Name   lua
    Match  *
    script /fluent-bit/etc/cleanup.lua
    call   infer_level

# =========================================================
# FILTERS — нормализация event timestamp + защита GELF mandatory полей
# =========================================================
# 1) Event ts из record.datetime (Laravel/Monolog/PhpErrorCatcher, ISO 8601)
#    или record.time_local (nginx access). Иначе — оставляем входной ts.
# 2) Top-level "timestamp" (если случайно попал из стороннего PHP-логгера)
#    переименовывается в "timestamp_raw": GELF-decoder валит запись на
#    "invalid timestamp (STRING)", если тип не number. Сохраняем как _raw,
#    чтобы исходное значение было видно в Graylog для отладки.
# 3) short_message != "" — Graylog кидает "empty mandatory short_message"
#    даже когда ключ есть, но строка пустая (modify Condition Key_does_not_exist
#    такое не отсекает).
[FILTER]
    Name   lua
    Match  *
    script /fluent-bit/etc/cleanup.lua
    call   normalize_event_time

# =========================================================
# FILTERS — расплющивание вложенных map/array (для GELF)
# =========================================================
# Laravel/Monolog context.user.id, context.exception.trace[] и т.п. — GELF
# не поддерживает nested. Lua-фильтр превращает их в context_user_id,
# context_exception_trace_0. Применяется к ВСЕМ полям-таблицам, кроме служебных.
[FILTER]
    Name   lua
    Match  *
    script /fluent-bit/etc/cleanup.lua
    call   flatten_nested

# =========================================================
# OUTPUT
# =========================================================

[OUTPUT]
    Name             http
    Match            gl.*
    Host             ${GRAYLOG_HOST}
    Port             ${GRAYLOG_PORT}
    URI              ${GRAYLOG_URI}
    Format           gelf
    # GELF.level — поле для syslog severity (0..7). Пишем туда наш Lua-вычисленный
    # syslog_severity, а в "level" остаётся Monolog-шкала (200/250/300/...) — как в Laravel.
    Gelf_Level_Key   syslog_severity
    tls              On
    tls.verify       On
    Retry_Limit      5

# Экспорт internal_metrics в Prometheus-формате. nginx проксирует
# /sq_fluent_exporter → http://fluent-bit:2021/metrics (внутри docker-сети,
# наружу 2021 не публикуется).
[OUTPUT]
    Name   prometheus_exporter
    Match  internal_metrics
    Host   0.0.0.0
    Port   2021

# Debug-stdout убран намеренно: fluent-bit container залогинен fluentd-driver-ом,
# stdout попадал обратно в forward-input → каждая запись прокачивалась 2x под
# service:"fluent-bit". Если нужно дебажить локально — временно добавь stdout
# с Match gl.<service>.
