# Ротация логов dev.sa. Запускается контейнером logrotate (см. docker-compose.yml).
# Используем статический конфиг (вместо авто-генерации blacklabelops/logrotate),
# потому что нужен глоб *.log без рекурсии:
# подпапка orders/<group>/<id>.log иначе превращается в десятки тысяч правил.

nomail

# php — только верхнеуровневые *.log
/var/log/php_logs/*.log {
    su root root
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}

# php StreamStorage (NDJSON, читается fluent-bit'ом по tail-input).
# copytruncate обязателен: fluent-bit держит inode открытым, при rename inode
# меняется и tail слетает (приходится дожидаться Rotate_Wait + рескан).
/var/log/php_logs/php-stream.ndjson {
    su root root
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}

# mariadb — error.log, slow.log, mysql-slow.log
/var/log/mysql_logs/*.log {
    su root root
    daily
    rotate 3
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}
